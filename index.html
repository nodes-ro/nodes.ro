<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>nodes.ro — Application Portfolio</title>
    <meta content="We transform ideas into software. Explore the nodes.ro application portfolio." name="description">
    <meta content="nodes.ro, software, development, Cluj, Romania, applications, web, portfolio" name="keywords">
    <meta content="nodes.ro" name="author">
    <meta content="index, follow" name="robots">
    <meta content="#27445D" name="theme-color">

    <link href="https://nodes.ro/" rel="canonical">
    <link href="static/logo.png" rel="icon" type="image/png">
    <link href="static/styles.css" rel="stylesheet">

    <meta property="og:title" content="nodes.ro — Application Portfolio">
    <meta property="og:description" content="We transform ideas into software. Explore the nodes.ro application portfolio.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://nodes.ro/">
    <meta property="og:image" content="https://nodes.ro/static/logo.png">
    <meta property="og:site_name" content="nodes.ro">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="nodes.ro — Application Portfolio">
    <meta name="twitter:description" content="We transform ideas into software. Explore the nodes.ro application portfolio.">
    <meta name="twitter:image" content="https://nodes.ro/static/logo.png">

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "nodes.ro",
      "url": "https://nodes.ro/",
      "logo": "https://nodes.ro/static/logo.png",
      "email": "nodes.ro@proton.me"
    }
    </script>

    <link href="https://fonts.googleapis.com" rel="preconnect">
    <link crossorigin href="https://fonts.gstatic.com" rel="preconnect">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
</head>
<body>
<div class="container">
    <input id="flip-toggle" type="checkbox"/>
    <label for="flip-toggle">
        <div class="card-wrapper">
            <div class="card">
                <div class="card-front">
                    <div class="overlay"></div>
                    <div class="button">
                        <i class="fa-solid fa-repeat"></i>
                    </div>
                    <div class="content">
                        <a href="#modal" style="text-decoration:none;">
                            <span class="number"><i class="fa-solid fa-circle-nodes"></i> nodes.ro</span>
                        </a>
                        <h2>Application Portfolio</h2>
                        <p>
                            We transform ideas into software <i class="fa-regular fa-lightbulb glowing-lightbulb"></i> for over 15 years.
                        </p>
                    </div>
                </div>

                <div class="card-back">
                    <div class="bg-overlay current"></div>
                    <div class="bg-overlay next"></div>
                    <div class="overlay"></div>
                    <div class="button">
                        <i class="fa-solid fa-repeat"></i>
                    </div>
                    <div class="content content-wide">
                        <div class="projects-overview">
                            <div class="overview-header">
                                <h3><i class="fa-solid fa-diagram-project"></i> Explore Projects</h3>
                                <span id="project-total" class="overview-pill">Loading...</span>
                            </div>
                            <div id="category-grid" class="category-grid" aria-live="polite"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </label>

    <div class="modal" id="modal">
        <div class="modal-content">
            <a class="modal-close" href="#"><i class="fa-solid fa-xmark"></i></a>
            <img src="static/logo.png" width="140" alt="nodes.ro logo">
            <div style="text-align:left;">
                <section class="portfolio">
                    <header>
                        <h3><i class="fa-solid fa-briefcase"></i> Discover</h3>
                    </header>
                    <div class="portfolio-items">
                        <div class="portfolio-item">
                            <i class="fa-solid fa-laptop-code"></i>
                            <span><a href="https://botacatalin.github.io/Blog/" style="text-decoration:none;">Explore Our Blog</a></span>
                        </div>
                        <div class="portfolio-item">
                            <i class="fas fa-hand-holding-heart"></i>
                            <span>
                                <a href="https://revolut.me/catalilb7" role="button" style="text-decoration:none;">Support Our Projects</a>
                                <small style="font-size: 0.8em; color: gray;">(via Revolut)</small>
                            </span>
                        </div>
                        <div class="portfolio-item">
                            <i class="fa-solid fa-envelope"></i>
                            <span>
                                <a href="mailto:nodes.ro@proton.me" style="text-decoration:none;">Contact us: nodes.ro@proton.me</a>
                            </span>
                        </div>
                    </div>
                </section>
            </div>
        </div>
    </div>

    <div class="modal" id="modal-projects">
        <div class="modal-content modal-content-large">
            <a class="modal-close" href="#"><i class="fa-solid fa-xmark"></i></a>
            <img src="static/logo.png" width="120" alt="nodes.ro logo">
            <section class="portfolio" style="text-align:left; width:100%;">
                <header class="projects-header">
                    <h3><i class="fa-solid fa-layer-group"></i> Project Catalog</h3>
                    <div id="category-filter" class="category-filter"></div>
                </header>
                <div id="projects-list" class="projects-list"></div>
            </section>
        </div>
    </div>
</div>

<script>
(() => {
  const categoryGrid = document.getElementById('category-grid');
  const projectTotal = document.getElementById('project-total');
  const categoryFilter = document.getElementById('category-filter');
  const projectsList = document.getElementById('projects-list');
  let allProjects = [];
  let activeCategory = 'All';

  function byCategory(items) {
    return items.reduce((acc, item) => {
      const key = item.category || 'Other';
      if (!acc[key]) acc[key] = [];
      acc[key].push(item);
      return acc;
    }, {});
  }

  function statusHtml(project) {
    if (!project.status) return '';
    return `<span class="project-status">${project.status}</span>`;
  }

  function linkHtml(project) {
    const links = [];
    if (project.project_url) links.push(`<a href="${project.project_url}" target="_blank" rel="noopener"><i class="fa-solid fa-up-right-from-square"></i> Open</a>`);
    if (project.github_url) links.push(`<a href="${project.github_url}" target="_blank" rel="noopener"><i class="fa-brands fa-github"></i> GitHub</a>`);
    return links.length ? `<div class="project-actions">${links.join('')}</div>` : '';
  }

  function renderProjectCards(filtered) {
    projectsList.innerHTML = filtered.map(project => `
      <article class="project-card">
        <div class="project-card-top">
          <span class="project-category">${project.category}</span>
          ${statusHtml(project)}
          <h4>${project.project_name}</h4>
        </div>
        <p>${project.short_description}</p>
        ${linkHtml(project)}
      </article>
    `).join('');
  }

  function renderFilters(categories) {
    const values = ['All', ...categories];
    categoryFilter.innerHTML = values.map(value => {
      const cls = value === activeCategory ? 'filter-chip active' : 'filter-chip';
      return `<button type="button" class="${cls}" data-category="${value}">${value}</button>`;
    }).join('');

    categoryFilter.querySelectorAll('button').forEach(btn => {
      btn.addEventListener('click', () => {
        activeCategory = btn.dataset.category;
        renderFilters(categories);
        const data = activeCategory === 'All' ? allProjects : allProjects.filter(item => item.category === activeCategory);
        renderProjectCards(data);
      });
    });
  }

  function renderOverview(data) {
    const grouped = byCategory(data);
    const categories = Object.keys(grouped);
    projectTotal.textContent = `${data.length} projects`;

    categoryGrid.innerHTML = categories.map(category => {
      const sample = grouped[category].slice(0, 2).map(item => `<li>${item.project_name}</li>`).join('');
      return `
        <a class="category-card" href="#modal-projects" data-category-open="${category}">
          <div class="category-card-head">
            <strong>${category}</strong>
            <span>${grouped[category].length}</span>
          </div>
          <ul>${sample}</ul>
        </a>
      `;
    }).join('');

    categoryGrid.querySelectorAll('[data-category-open]').forEach(el => {
      el.addEventListener('click', () => {
        activeCategory = el.dataset.categoryOpen;
        renderFilters(categories);
        renderProjectCards(allProjects.filter(item => item.category === activeCategory));
      });
    });

    renderFilters(categories);
    renderProjectCards(allProjects);
  }

  fetch('static/projects.json')
    .then(response => response.json())
    .then(data => {
      allProjects = Array.isArray(data.projects) ? data.projects : [];
      renderOverview(allProjects);
    })
    .catch(() => {
      projectTotal.textContent = 'Unable to load projects';
      categoryGrid.innerHTML = '<p class="load-error">Could not load project data.</p>';
    });
})();
</script>
</body>
</html>
