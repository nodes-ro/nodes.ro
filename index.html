<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>nodes.ro — Application Portfolio</title>

  <meta
    name="description"
    content="We transform ideas into software. nodes.ro application portfolio."
  />

  <meta
    name="keywords"
    content="nodes.ro, software, development, Cluj, Romania, applications, web, portfolio"
  />

  <meta name="author" content="nodes.ro" />
  <meta name="robots" content="index, follow" />

  <meta property="og:title" content="nodes.ro — Application Portfolio" />

  <meta
    property="og:description"
    content="We have been transforming ideas into software for over 15 years."
  />

  <meta property="og:type" content="website" />
  <meta property="og:image" content="static/logo.png" />

  <link rel="icon" type="image/png" href="static/logo.png" />

  <link
    rel="preload"
    as="image"
    href="static/bg.png"
    fetchpriority="high"
  />

  <link rel="preload" as="image" href="static/bg_back.png" />
  <link rel="preload" as="image" href="static/bg.jpg" />
  <link rel="preload" as="image" href="static/logo.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  />

  <link
    href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Roboto:wght@400;500&display=swap"
    rel="stylesheet"
  />

  <link
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    rel="stylesheet"
  />

  <style>
    :root {
      --heading-font: 'Montserrat', sans-serif;
      --body-font: 'Roboto', sans-serif;

      --bg: #27445d;
      --text: #efe9d5;

      --accent: #71bbb2;
      --accent-dark: #497d74;

      --panel: rgba(10, 18, 28, 0.78);
      --border: rgba(113, 187, 178, 0.42);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      min-height: 100vh;

      display: flex;
      justify-content: center;
      align-items: center;

      overflow: hidden;

      font-family: var(--heading-font);

      background-color: var(--bg);
    }

    body::before {
      content: '';

      position: fixed;
      inset: 0;

      background-image: url('static/bg.jpg');
      background-repeat: repeat;

      opacity: 0.035;

      pointer-events: none;
    }

    a {
      color: inherit;
    }

    button,
    label {
      font: inherit;
    }

    .container {
      position: relative;

      width: 100%;
      min-height: 100vh;

      display: flex;
      justify-content: center;
      align-items: center;

      perspective: 1500px;

      padding: 24px;
    }

    #flip-toggle {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .card-wrapper {
      position: relative;

      width: min(1024px, 94vw);
      height: min(600px, 82vh);

      min-height: 520px;

      transform-style: preserve-3d;
      transition: transform 850ms ease-in-out;
    }

    #flip-toggle:checked ~ .card-wrapper {
      transform: rotateY(180deg);
    }

    .card {
      position: relative;

      width: 100%;
      height: 100%;

      transform-style: preserve-3d;
    }

    .card-front,
    .card-back {
      position: absolute;
      inset: 0;

      display: flex;
      justify-content: center;
      align-items: center;

      overflow: hidden;

      border-radius: 20px;

      isolation: isolate;
      backface-visibility: hidden;

      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    .card-front {
      background: url('static/bg.png') center / cover no-repeat;
    }

    .card-back {
      transform: rotateY(180deg);
      background: url('static/bg_back.png') center / cover no-repeat;
    }

    .overlay {
      position: absolute;

      left: 0;
      bottom: 0;

      width: 100%;
      height: 38%;

      z-index: 2;

      background: linear-gradient(
        0deg,
        rgba(17, 31, 43, 0.96) 20%,
        rgba(39, 68, 93, 0.82) 100%
      );

      box-shadow: 0 0 30px rgba(0, 0, 0, 0.7);

      pointer-events: none;
    }

    .card-back .overlay {
      display: none;
    }

    .content {
      position: absolute;

      left: 30px;
      bottom: 24px;

      z-index: 4;

      max-width: 72%;

      color: var(--text);
    }

    .content-wide {
      inset: 18px 18px 84px;
      max-width: none;
      width: auto;
      display: flex;
    }

    .brand-link {
      text-decoration: none;
    }

    .number {
      display: inline-flex;
      align-items: center;
      gap: 8px;

      font-size: 20px;
      font-weight: 700;

      color: var(--accent);
    }

    .content h1 {
      margin: 10px 0;

      font-size: clamp(28px, 5vw, 42px);
      line-height: 1.08;

      color: var(--text);
    }

    .content p {
      margin: 0;

      max-width: 680px;

      line-height: 1.6;

      opacity: 0.92;

      font-size: clamp(15px, 2vw, 17px);

      font-family: var(--body-font);
    }

    .glowing-lightbulb {
      font-size: 20px;

      background: linear-gradient(
        45deg,
        var(--accent-dark),
        var(--accent)
      );

      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;

      filter:
        drop-shadow(0 0 8px rgba(113, 187, 178, 0.8))
        drop-shadow(0 0 16px rgba(113, 187, 178, 0.6));
    }

    .button,
    .modal-close {
      border: 0;

      position: absolute;

      width: 48px;
      height: 48px;

      display: inline-flex;
      justify-content: center;
      align-items: center;

      cursor: pointer;

      border-radius: 50%;

      color: #fff;

      background: linear-gradient(
        45deg,
        var(--accent-dark),
        var(--accent)
      );

      box-shadow: 0 4px 10px rgba(113, 187, 178, 0.4);
    }

    .button {
      right: 30px;
      bottom: 18px;

      z-index: 20;
    }

    .projects-overview {
      width: 100%;
      height: 100%;

      display: flex;
      flex-direction: column;

      gap: 10px;

      padding: 14px;

      overflow: auto;

      border-radius: 16px;

      background: var(--panel);
      border: 1px solid var(--border);
    }

    .overview-header {
      display: flex;
      align-items: center;
      justify-content: space-between;

      gap: 12px;
    }

    .overview-header h3 {
      margin: 0;

      color: var(--text);
      font-size: 1.15rem;
    }

    .overview-pill {
      padding: 6px 12px;

      border-radius: 999px;

      color: var(--text);

      font-size: 0.85rem;

      background: rgba(113, 187, 178, 0.2);
      border: 1px solid rgba(113, 187, 178, 0.6);
    }

    .window-toolbar {
      display: flex;
      align-items: center;

      gap: 8px;

      padding: 8px 10px;

      border-radius: 8px;

      background: rgba(0, 0, 0, 0.38);
      border: 1px solid rgba(113, 187, 178, 0.3);

      color: var(--text);
    }

    .dot {
      width: 10px;
      height: 10px;

      border-radius: 50%;
    }

    .dot.red {
      background: #d96b6b;
    }

    .dot.yellow {
      background: #c7a85a;
    }

    .dot.green {
      background: #71bbb2;
    }

    .toolbar-title {
      margin-left: 4px;

      font-size: 0.8rem;
      opacity: 0.85;
    }

    .category-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));

      gap: 12px;
    }

    .category-card {
      display: flex;
      flex-direction: column;

      height: 180px;

      overflow: hidden;

      border-radius: 10px;

      color: var(--text);

      background: linear-gradient(
        180deg,
        rgba(40, 57, 74, 0.92),
        rgba(17, 26, 36, 0.95)
      );

      border: 1px solid rgba(113, 187, 178, 0.38);
    }

    .window-head {
      display: flex;
      justify-content: space-between;
      align-items: center;

      padding: 8px 10px;

      background: rgba(113, 187, 178, 0.16);
      border-bottom: 1px solid rgba(113, 187, 178, 0.3);
    }

    .window-title-link {
      color: var(--text);

      text-decoration: none;

      font-size: 0.86rem;
      font-weight: 600;
    }

    .project-links {
      margin: 0;
      padding: 10px 16px;

      list-style: none;

      display: flex;
      flex-direction: column;

      gap: 8px;

      overflow-y: auto;
    }

    .project-link {
      display: inline-flex;
      align-items: center;

      gap: 7px;

      color: #dff8f4;

      text-decoration: none;

      font-size: 0.86rem;
    }

    .modal {
      position: fixed;
      inset: 0;

      display: none;
      justify-content: center;
      align-items: center;

      padding: 18px;

      z-index: 1000;

      background: rgba(0, 0, 0, 0.72);
    }

    .modal.is-open {
      display: flex;
    }

    .modal-content {
      position: relative;

      width: min(92vw, 520px);

      padding: 24px;

      border-radius: 12px;

      background: #fff;
    }

    .modal-content-details {
      max-width: 720px;
    }

    .modal-close {
      top: 12px;
      right: 12px;

      width: 36px;
      height: 36px;

      font-size: 18px;
    }

    .portfolio h3 {
      color: #27445d;
    }

    .portfolio-items {
      display: flex;
      flex-direction: column;

      gap: 16px;

      margin-top: 20px;
    }

    .portfolio-item {
      display: flex;
      align-items: center;

      gap: 10px;

      padding: 15px 20px;

      border-radius: 10px;

      background: #f9f9f9;
      border: 1px solid #ddd;
    }

    .portfolio-item a {
      color: #1f5f89;
      text-decoration: none;
    }

    .project-detail-card {
      display: flex;
      flex-direction: column;

      gap: 10px;

      padding: 16px;

      border-radius: 12px;

      background: #f8fbfd;
      border: 1px solid #dce7ef;
    }

    .project-actions {
      display: flex;
      flex-wrap: wrap;

      gap: 10px;
    }

    .project-actions a {
      display: inline-flex;
      align-items: center;

      gap: 6px;

      padding: 10px 14px;

      border-radius: 8px;

      text-decoration: none;

      color: #1f5f89;

      background: rgba(39, 68, 93, 0.08);
    }

    .load-error {
      display: flex;
      align-items: center;

      gap: 10px;

      padding: 14px;

      border-radius: 10px;

      color: #ffb4b4;

      background: rgba(255, 0, 0, 0.08);
      border: 1px solid rgba(255, 0, 0, 0.25);
    }

    @media (max-width: 768px) {
      .category-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <!-- your existing body content remains unchanged -->
  <!-- only script section changed -->

 <script>
  (() => {
    const $ = (selector, scope = document) => scope.querySelector(selector);
    const $$ = (selector, scope = document) => [...scope.querySelectorAll(selector)];

    const els = {
      grid: $('#category-grid'),
      total: $('#project-total'),
      detail: $('#project-detail-content'),
      aboutModal: $('#about-modal'),
      projectModal: $('#project-modal'),
      aboutLink: $('[data-open-modal="about"]')
    };

    let projects = [];
    let lastFocusedElement = null;

    const text = (value, fallback = 'Not available') => (
      value === null || value === undefined || value === '' ? fallback : String(value)
    );

    const escapeHtml = value => text(value, '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');

    const isSafeUrl = value => {
      if (!value) return false;

      try {
        return ['https:', 'mailto:'].includes(new URL(value).protocol);
      } catch {
        return false;
      }
    };

    const setModalState = (modal, isOpen) => {
      if (!modal) return;

      modal.classList.toggle('is-open', isOpen);
      modal.setAttribute('aria-hidden', String(!isOpen));
    };

    const openModal = modal => {
      if (!modal) return;

      lastFocusedElement = document.activeElement;
      setModalState(modal, true);
      document.body.style.overflow = 'hidden';
      $('[data-close-modal]', modal)?.focus();
    };

    const closeModals = event => {
      event?.preventDefault();

      $$('.modal.is-open').forEach(modal => setModalState(modal, false));

      document.body.style.overflow = '';
      lastFocusedElement?.focus?.();
    };

    const projectActions = project => {
      const links = [
        ['project_url', 'fa-solid fa-up-right-from-square', 'Open Project'],
        ['github_url', 'fa-brands fa-github', 'GitHub']
      ]
        .filter(([key]) => isSafeUrl(project[key]))
        .map(([key, icon, label]) => `
          <a href="${escapeHtml(project[key])}" target="_blank" rel="noopener noreferrer">
            <i class="${icon}" aria-hidden="true"></i> ${label}
          </a>
        `);

      return links.length ? `<div class="project-actions">${links.join('')}</div>` : '';
    };

    const groupProjects = items => items.reduce((groups, project, index) => {
      const category = text(project.category, 'Other');

      groups[category] ??= [];
      groups[category].push({ project, index });

      return groups;
    }, {});

    const renderProjectDetails = project => {
      els.detail.innerHTML = `
        <h4>
          <i class="fa-solid fa-cube" aria-hidden="true"></i>
          ${escapeHtml(text(project.project_name, 'Unnamed project'))}
        </h4>

        <p>
          <i class="fa-solid fa-layer-group" aria-hidden="true"></i>
          <strong>Category:</strong>
          ${escapeHtml(text(project.category, 'Other'))}
        </p>

        <p>
          <i class="fa-solid fa-align-left" aria-hidden="true"></i>
          <strong>Description:</strong>
          ${escapeHtml(text(project.short_description))}
        </p>

        ${projectActions(project)}
      `;

      openModal(els.projectModal);
    };

    const renderCategories = items => Object.entries(groupProjects(items)).map(([category, group]) => `
      <section class="category-card" aria-label="${escapeHtml(category)} projects">
        <div class="window-head">
          <span class="window-title-link">
            <i class="fa-solid fa-folder-open" aria-hidden="true"></i>
            ${escapeHtml(category)}
          </span>

          <span class="window-open">
            <i class="fa-solid fa-hashtag" aria-hidden="true"></i>
            ${group.length}
          </span>
        </div>

        <ul class="project-links">
          ${group.map(({ project, index }) => `
            <li>
              <a
                class="project-link"
                href="#project-modal"
                data-project-id="${index}"
                aria-label="Open details for ${escapeHtml(text(project.project_name, 'Unnamed project'))}"
              >
                <i class="fa-solid fa-link" aria-hidden="true"></i>
                ${escapeHtml(text(project.project_name, 'Unnamed project'))}
              </a>
            </li>
          `).join('')}
        </ul>
      </section>
    `).join('');

    const renderOverview = items => {
      els.total.textContent = `${items.length} projects`;

      els.grid.innerHTML = items.length
        ? renderCategories(items)
        : `
          <div class="load-error">
            <i class="fa-solid fa-box-open" aria-hidden="true"></i>
            <span>No projects available.</span>
          </div>
        `;
    };

    const loadProjects = async () => {
      try {
        const response = await fetch('static/projects.json', { cache: 'no-store' });

        if (!response.ok) {
          throw new Error('Unable to load static/projects.json');
        }

        const data = await response.json();

        projects = Array.isArray(data.projects) ? data.projects : [];

        renderOverview(projects);
      } catch (error) {
        projects = [];

        els.total.textContent = 'Unable to load projects';

        els.grid.innerHTML = `
          <div class="load-error">
            <i class="fa-solid fa-triangle-exclamation" aria-hidden="true"></i>
            <span>Unable to load project data. Please check static/projects.json.</span>
          </div>
        `;

        console.error(error);
      }
    };

    els.aboutLink?.addEventListener('click', event => {
      event.preventDefault();
      openModal(els.aboutModal);
    });

    els.grid?.addEventListener('click', event => {
      const link = event.target.closest('[data-project-id]');

      if (!link) return;

      event.preventDefault();

      const project = projects[Number(link.dataset.projectId)];

      if (project) {
        renderProjectDetails(project);
      }
    });

    $$('[data-close-modal]').forEach(button => {
      button.addEventListener('click', closeModals);
    });

    $$('.modal').forEach(modal => {
      modal.addEventListener('click', event => {
        if (event.target === modal) {
          closeModals(event);
        }
      });
    });

    document.addEventListener('keydown', event => {
      if (event.key === 'Escape') {
        closeModals(event);
      }
    });

    loadProjects();
  })();
</script>
</body>
</html>
