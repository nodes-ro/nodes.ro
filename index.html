<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>nodes.ro</title>
    <meta content="Transformam idei in software. Portofoliu apliatii." name="description">
    <meta content="nodes.ro, software, dezvoltare, cluj, romania, aplicații, web, portofoliu" name="keywords">
    <meta content="nodes.ro" name="author">
    <meta content="index, follow" name="robots">

    <link href="static/styles.css" rel="stylesheet">

    <link rel="preload" as="image" href="static/bg.png" fetchpriority="high">
    <link rel="preload" as="image" href="static/bg_back.png">
    <link rel="preload" as="image" href="static/bg.jpg">
    <link rel="preload" as="image" href="static/logo.png">

    <link href="https://fonts.googleapis.com" rel="preconnect">
    <link crossorigin href="https://fonts.gstatic.com" rel="preconnect">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
</head>
<body>
<div class="container">
    <input id="flip-toggle" type="checkbox"/>
    <div class="card-wrapper">
            <div class="card">
                <div class="card-front">
                    <div class="overlay"></div>
                    <label class="button" for="flip-toggle" aria-label="Flip card">
                        <i class="fa-solid fa-repeat"></i>
                    </label>
                    <div class="content">
                        <a href="#modal" style="text-decoration:none;">
                            <span class="number"><i class="fa-solid fa-circle-nodes"></i> nodes.ro</span>
                        </a>
                        <h2>Portfoliu Aplicații</h2>
                        <p>
                            Transformăm idei în software <i class="fa-regular fa-lightbulb glowing-lightbulb"></i> de peste 15 de ani.
                        </p>
                    </div>
                </div>

                <div class="card-back">
                    <div class="bg-overlay current"></div>
                    <div class="bg-overlay next"></div>
                    <div class="overlay"></div>
                    <label class="button" for="flip-toggle" aria-label="Flip card">
                        <i class="fa-solid fa-repeat"></i>
                    </label>
                    <div class="content content-wide">
                        <div class="projects-overview">
                            <div class="overview-header">
                                <h3><i class="fa-solid fa-desktop"></i> Project Explorer</h3>
                                <span id="project-total" class="overview-pill">Loading...</span>
                            </div>
                            <div class="window-toolbar">
                                <span class="dot red"></span>
                                <span class="dot yellow"></span>
                                <span class="dot green"></span>
                                <span class="toolbar-title">nodes.ro / projects</span>
                            </div>
                            <div id="category-grid" class="category-grid" aria-live="polite"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <a class="modal-close" href="#" aria-label="Close popup"><i class="fa-solid fa-xmark"></i></a>
            <img src="static/logo.png" width="140" height="140" loading="lazy" decoding="async" alt="nodes.ro logo">
            <div style="text-align:left;">
                <section class="portfolio">
                    <header>
                        <h3><i class="fa-solid fa-briefcase"></i> Descoperă</h3>
                    </header>
                    <div class="portfolio-items">
                        <div class="portfolio-item">
                            <i class="fa-solid fa-laptop-code"></i>
                            <span><a href="https://botacatalin.github.io/Blog/" style="text-decoration:none;">Explorează Blogul Nostru</a></span>
                        </div>
                        <div class="portfolio-item">
                            <i class="fas fa-hand-holding-heart"></i>
                            <span>
                                <a href="https://revolut.me/catalilb7" role="button" style="text-decoration:none;">Susține Proiectele Noastre</a>
                                <small style="font-size: 0.8em; color: gray;">(via Revolut)</small>
                            </span>
                        </div>
                        <div class="portfolio-item">
                            <i class="fa-solid fa-envelope"></i>
                            <span>
                                <a href="mailto:nodes.ro@proton.me" style="text-decoration:none;">Contactează-ne: nodes.ro@proton.me</a>
                            </span>
                        </div>
                    </div>
                </section>
            </div>
        </div>
    </div>

    

    <div class="modal" id="modal-project-details">
        <div class="modal-content modal-content-details">
            <a class="modal-close" href="#" aria-label="Close popup"><i class="fa-solid fa-xmark"></i></a>
            <section class="portfolio" style="text-align:left; width:100%;">
                <header class="projects-header">
                    <h3><i class="fa-solid fa-circle-info"></i> Project Details</h3>
                </header>
                <article class="project-detail-card" id="project-detail-content"></article>
            </section>
        </div>
    </div>

</div>

<script>
(() => {
  const categoryGrid = document.getElementById('category-grid');
  const projectTotal = document.getElementById('project-total');
  const detailContent = document.getElementById('project-detail-content');
  let allProjects = [];

  function safe(value, fallback = 'Not available') {
    return value || fallback;
  }

  function projectLinks(project) {
    return `
      <div class="project-actions">
        ${project.project_url ? `<a href="${project.project_url}" target="_blank" rel="noopener"><i class="fa-solid fa-up-right-from-square"></i> Open Project</a>` : ''}
        ${project.github_url ? `<a href="${project.github_url}" target="_blank" rel="noopener"><i class="fa-brands fa-github"></i> GitHub</a>` : ''}
      </div>
    `;
  }

  function renderProjectDetails(project) {
    detailContent.innerHTML = `
      <h4><i class="fa-solid fa-cube"></i> ${project.project_name}</h4>
      <p><i class="fa-solid fa-layer-group"></i> <strong>Category:</strong> ${safe(project.category)}</p>
      <p><i class="fa-solid fa-align-left"></i> <strong>Description:</strong> ${safe(project.short_description)}</p>
      <p><i class="fa-brands fa-github"></i> <strong>GitHub:</strong> ${project.github_url ? `<a href="${project.github_url}" target="_blank" rel="noopener">${project.github_url}</a>` : 'Not available'}</p>
      <p><i class="fa-solid fa-link"></i> <strong>Project URL:</strong> ${project.project_url ? `<a href="${project.project_url}" target="_blank" rel="noopener">${project.project_url}</a>` : 'Not available'}</p>
      ${projectLinks(project)}
    `;
  }

  function attachProjectHandlers() {
    categoryGrid.querySelectorAll('[data-project-id]').forEach(link => {
      link.addEventListener('click', () => {
        const project = allProjects[Number(link.dataset.projectId)];
        if (project) renderProjectDetails(project);
      });
    });
  }

  function renderOverview(projects) {
    projectTotal.textContent = `${projects.length} projects`;
    categoryGrid.innerHTML = projects.map((project, idx) => `
      <a class="category-card" href="#modal-project-details" data-project-id="${idx}">
        <div class="window-head">
          <span class="window-title"><i class="fa-solid fa-window-maximize"></i> ${safe(project.project_name, 'Unnamed project')}</span>
          <span class="window-open"><i class="fa-solid fa-up-right-from-square"></i></span>
        </div>
        <p class="project-summary">${safe(project.short_description)}</p>
      </a>
    `).join('');
    attachProjectHandlers();
  }

  function closeModal(event) {
    event.preventDefault();
    if (window.location.hash) {
      history.pushState('', document.title, window.location.pathname + window.location.search);
    }
  }

  document.querySelectorAll('.modal-close').forEach(closeBtn => {
    closeBtn.addEventListener('click', closeModal);
  });

  fetch('static/projects.json')
    .then(response => response.json())
    .then(data => {
      allProjects = Array.isArray(data.projects) ? data.projects : [];
      renderOverview(allProjects);
    })
    .catch(() => {
      projectTotal.textContent = 'Unable to load projects';
      categoryGrid.innerHTML = '<p class="load-error">Could not load project data.</p>';
    });
})();
</script>
</body>
</html>
