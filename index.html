<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>nodes.ro — Application Portfolio</title>
  <meta name="description" content="We transform ideas into software. nodes.ro application portfolio." />
  <meta name="keywords" content="nodes.ro, software, development, Cluj, Romania, applications, web, portfolio" />
  <meta name="author" content="nodes.ro" />
  <meta name="robots" content="index, follow" />

  <meta property="og:title" content="nodes.ro — Application Portfolio" />
  <meta property="og:description" content="We have been transforming ideas into software for over 15 years." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="static/logo.png" />

  <link rel="icon" type="image/png" href="static/logo.png" />

  <link rel="preload" as="image" href="static/bg.png" fetchpriority="high" />
  <link rel="preload" as="image" href="static/bg_back.png" />
  <link rel="preload" as="image" href="static/bg.jpg" />
  <link rel="preload" as="image" href="static/logo.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <link
    href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Roboto:wght@400;500&display=swap"
    rel="stylesheet"
  />

  <link
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="static/style.css" />
</head>

<body>
  <main class="container">
    <input id="flip-toggle" type="checkbox" aria-hidden="true" />

    <div class="card-wrapper">
      <section class="card" aria-label="nodes.ro portfolio card">
        <div class="card-front">
          <div class="overlay"></div>

          <label class="button" for="flip-toggle" aria-label="Open project list">
            <i class="fa-solid fa-repeat" aria-hidden="true"></i>
          </label>

          <div class="content">
            <a href="#about" class="brand-link" data-open-modal="about">
              <span class="number">
                <i class="fa-solid fa-circle-nodes" aria-hidden="true"></i>
                nodes.ro
              </span>
            </a>

            <h1>Application Portfolio</h1>

            <p>
              Transforming ideas into software
              <i class="fa-regular fa-lightbulb glowing-lightbulb" aria-hidden="true"></i>
              for over 15 years.
            </p>
          </div>
        </div>

        <div class="card-back">
          <label class="button" for="flip-toggle" aria-label="Back to cover">
            <i class="fa-solid fa-repeat" aria-hidden="true"></i>
          </label>

          <div class="content content-wide">
            <section class="projects-overview" aria-label="Project Explorer">
              <div class="overview-header">
                <h3>
                  <i class="fa-solid fa-desktop" aria-hidden="true"></i>
                  Project Explorer
                </h3>

                <span id="project-total" class="overview-pill">
                  <i class="fa-solid fa-spinner fa-spin" aria-hidden="true"></i>
                  Loading projects
                </span>
              </div>

              <div class="window-toolbar" aria-hidden="true">
                <span class="dot red"></span>
                <span class="dot yellow"></span>
                <span class="dot green"></span>
                <span class="toolbar-title">nodes.ro / projects</span>
              </div>

              <div id="category-grid" class="category-grid" aria-live="polite"></div>
            </section>
          </div>
        </div>
      </section>
    </div>

    <section
      class="modal"
      id="about-modal"
      aria-hidden="true"
      role="dialog"
      aria-modal="true"
      aria-labelledby="about-title"
    >
      <div class="modal-content">
        <button class="modal-close" type="button" data-close-modal aria-label="Close popup">
          <i class="fa-solid fa-xmark" aria-hidden="true"></i>
        </button>

        <img
          src="static/logo.png"
          width="140"
          height="140"
          loading="lazy"
          decoding="async"
          alt="nodes.ro logo"
        />

        <section class="portfolio">
          <header>
            <h3 id="about-title">
              <i class="fa-solid fa-briefcase" aria-hidden="true"></i>
              Discover
            </h3>
          </header>

          <div class="portfolio-items">
            <div class="portfolio-item">
              <i class="fa-solid fa-laptop-code" aria-hidden="true"></i>
              <span>
                <a href="https://botacatalin.github.io/Blog/" target="_blank" rel="noopener">
                  Explore Our Blog
                </a>
              </span>
            </div>

            <div class="portfolio-item">
              <i class="fas fa-hand-holding-heart" aria-hidden="true"></i>
              <span>
                <a href="https://revolut.me/catalilb7" target="_blank" rel="noopener">
                  Support Our Projects
                </a>
                <small style="font-size: 0.8em; color: gray;">(via Revolut)</small>
              </span>
            </div>

            <div class="portfolio-item">
              <i class="fa-solid fa-envelope" aria-hidden="true"></i>
              <span>
                <a href="mailto:nodes.ro@proton.me">Contact us: nodes.ro@proton.me</a>
              </span>
            </div>
          </div>
        </section>
      </div>
    </section>

    <section
      class="modal"
      id="project-modal"
      aria-hidden="true"
      role="dialog"
      aria-modal="true"
      aria-labelledby="project-detail-title"
    >
      <div class="modal-content modal-content-details">
        <button class="modal-close" type="button" data-close-modal aria-label="Close popup">
          <i class="fa-solid fa-xmark" aria-hidden="true"></i>
        </button>

        <section class="portfolio">
          <header>
            <h3 id="project-detail-title">
              <i class="fa-solid fa-circle-info" aria-hidden="true"></i>
              Project Details
            </h3>
          </header>

          <article class="project-detail-card" id="project-detail-content"></article>
        </section>
      </div>
    </section>
  </main>

  <script src="static/script.js" defer></script>
</body>
</html>
