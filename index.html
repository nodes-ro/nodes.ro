<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>nodes.ro — Application Portfolio</title>
  <meta name="description" content="We transform ideas into software. nodes.ro application portfolio." />
  <meta name="keywords" content="nodes.ro, software, development, Cluj, Romania, applications, web, portfolio" />
  <meta name="author" content="nodes.ro" />
  <meta name="robots" content="index, follow" />

  <meta property="og:title" content="nodes.ro — Application Portfolio" />
  <meta property="og:description" content="We have been transforming ideas into software for over 15 years." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="static/logo.png" />

  <link rel="icon" type="image/png" href="static/logo.png" />

  <link rel="preload" as="image" href="static/bg.png" fetchpriority="high" />
  <link rel="preload" as="image" href="static/bg_back.png" />
  <link rel="preload" as="image" href="static/bg.jpg" />
  <link rel="preload" as="image" href="static/logo.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet" />

  <style>
    :root {
      --heading-font: 'Montserrat', sans-serif;
      --body-font: 'Roboto', sans-serif;
      --bg: #27445D;
      --text: #EFE9D5;
      --accent: #71BBB2;
      --accent-dark: #497D74;
      --panel: rgba(10, 18, 28, 0.78);
      --border: rgba(113, 187, 178, 0.42);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: var(--bg);
      overflow: hidden;
      font-family: var(--heading-font);
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url('static/bg.jpg');
      background-repeat: repeat;
      opacity: 0.035;
      pointer-events: none;
    }

    a {
      color: inherit;
    }

    button,
    label {
      font: inherit;
    }

    .container {
      position: relative;
      width: 100%;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      perspective: 1500px;
      padding: 24px;
    }

    #flip-toggle {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .card-wrapper {
      position: relative;
      width: min(1024px, 94vw);
      height: min(600px, 82vh);
      min-height: 520px;
      transform-style: preserve-3d;
      transition: transform 850ms ease-in-out;
    }

    #flip-toggle:checked ~ .card-wrapper {
      transform: rotateY(180deg);
    }

    .card {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
    }

    .card-front,
    .card-back {
      isolation: isolate;
      position: absolute;
      inset: 0;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      backface-visibility: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card-front {
      background: url('static/bg.png') center / cover no-repeat;
    }

    .card-back {
      background: url('static/bg_back.png') center / cover no-repeat;
      transform: rotateY(180deg);
    }

    .card .overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 38%;
      background: linear-gradient(0deg, rgba(17, 31, 43, 0.96) 20%, rgba(39, 68, 93, 0.82) 100%);
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.7);
      z-index: 2;
      pointer-events: none;
    }

    .card-back .overlay {
      display: none;
    }

    .content {
      position: absolute;
      left: 30px;
      bottom: 24px;
      z-index: 4;
      max-width: 72%;
      color: var(--text);
    }

    .content-wide {
      inset: 18px 18px 84px 18px;
      max-width: none;
      width: auto;
      display: flex;
    }

    .brand-link {
      text-decoration: none;
    }

    .number {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 20px;
      color: var(--accent);
      font-weight: 700;
    }

    .content h1,
    .content h2 {
      margin: 10px 0;
      color: var(--text);
      font-size: clamp(28px, 5vw, 42px);
      line-height: 1.08;
    }

    .content p {
      max-width: 680px;
      margin: 0;
      font-family: var(--body-font);
      font-size: clamp(15px, 2vw, 17px);
      line-height: 1.6;
      opacity: 0.92;
    }

    .glowing-lightbulb {
      font-size: 20px;
      background: linear-gradient(45deg, var(--accent-dark), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 8px rgba(113, 187, 178, 0.8)) drop-shadow(0 0 16px rgba(113, 187, 178, 0.6));
    }

    .button,
    .modal-close {
      border: 0;
      position: absolute;
      width: 48px;
      height: 48px;
      background: linear-gradient(45deg, var(--accent-dark), var(--accent));
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(113, 187, 178, 0.4);
      text-decoration: none;
      color: #fff;
    }

    .button {
      bottom: 18px;
      right: 30px;
      z-index: 20;
    }

    .projects-overview {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
      overflow: auto;
    }

    .overview-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .overview-header h3 {
      margin: 0;
      font-size: 1.15rem;
      color: var(--text);
    }

    .overview-pill {
      background: rgba(113, 187, 178, 0.2);
      border: 1px solid rgba(113, 187, 178, 0.6);
      border-radius: 999px;
      padding: 6px 12px;
      color: var(--text);
      font-size: 0.85rem;
    }

    .window-toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid rgba(113, 187, 178, 0.3);
      border-radius: 8px;
      padding: 8px 10px;
      background: rgba(0, 0, 0, 0.38);
      color: var(--text);
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .dot.red { background: #d96b6b; }
    .dot.yellow { background: #c7a85a; }
    .dot.green { background: #71BBB2; }

    .toolbar-title {
      margin-left: 4px;
      font-size: 0.8rem;
      opacity: 0.85;
    }

    .category-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .category-card {
      display: flex;
      flex-direction: column;
      height: 180px;
      color: var(--text);
      background: linear-gradient(180deg, rgba(40, 57, 74, 0.92), rgba(17, 26, 36, 0.95));
      border: 1px solid rgba(113, 187, 178, 0.38);
      border-radius: 10px;
      overflow: hidden;
    }

    .window-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 10px;
      background: rgba(113, 187, 178, 0.16);
      border-bottom: 1px solid rgba(113, 187, 178, 0.3);
    }

    .window-title-link {
      color: var(--text);
      text-decoration: none;
      font-size: 0.86rem;
      font-weight: 600;
    }

    .project-links {
      margin: 0;
      padding: 10px 16px;
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow-y: auto;
    }

    .project-link {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      color: #dff8f4;
      text-decoration: none;
      font-size: 0.86rem;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.72);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 18px;
    }

    .modal.is-open {
      display: flex;
    }

    .modal-content {
      background: #fff;
      padding: 24px;
      border-radius: 12px;
      max-width: 520px;
      width: min(92vw, 520px);
      position: relative;
    }

    .modal-content-details {
      max-width: 720px;
    }

    .modal-close {
      top: 12px;
      right: 12px;
      width: 36px;
      height: 36px;
      font-size: 18px;
    }

    .portfolio h3 {
      color: #27445D;
    }

    .portfolio-items {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-top: 20px;
    }

    .portfolio-item {
      background: #f9f9f9;
      border: 1px solid #ddd;
      padding: 15px 20px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .portfolio-item a {
      color: #1f5f89;
      text-decoration: none;
    }

    .project-detail-card {
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: #f8fbfd;
      border: 1px solid #dce7ef;
      border-radius: 12px;
      padding: 16px;
    }

    .project-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .project-actions a {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 14px;
      border-radius: 8px;
      background: rgba(39, 68, 93, 0.08);
      color: #1f5f89;
      text-decoration: none;
    }

    @media (max-width: 768px) {
      .category-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

      </section>
    </div>

    <section class="modal" id="about-modal" aria-hidden="true">

            </div>

            <div class="portfolio-item">
              <i class="fas fa-hand-holding-heart"></i>

              <span>
                <a href="https://revolut.me/catalilb7" target="_blank">
                  Support Our Projects
                </a>

                <small style="font-size: 0.8em; color: gray;">
                  (via Revolut)
                </small>
              </span>
            </div>

            <div class="portfolio-item">
              <i class="fa-solid fa-envelope"></i>

              <span>
                <a href="mailto:nodes.ro@proton.me">
                  Contact us: nodes.ro@proton.me
                </a>
              </span>
            </div>

          </div>
        </section>
      </div>
    </section>

    <section class="modal" id="project-modal" aria-hidden="true">

      <div class="modal-content modal-content-details">

        <button class="modal-close" type="button" data-close-modal aria-label="Close popup">
          <i class="fa-solid fa-xmark"></i>
        </button>

        <section class="portfolio">

          <header>
            <h3 id="project-detail-title">
              <i class="fa-solid fa-circle-info"></i>
              Project Details
            </h3>
          </header>

          <article class="project-detail-card" id="project-detail-content"></article>

        </section>
      </div>
    </section>

  </main>
